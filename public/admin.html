<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lanevox Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F3EF;--surface:#EEECEA;--surface2:#E8E7E3;
  --navy:#0A1628;--ink:#0A0A0A;--muted:#5A5A58;--faint:#9A9A97;
  --border:rgba(10,10,10,0.1);--success:#22C55E;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-weight:300;}
body{background:var(--bg);color:var(--ink);}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--bg);
}
.login-box{
  text-align:center;padding:48px 40px;background:#fff;
  border:1px solid var(--border);border-radius:16px;
  box-shadow:0 4px 32px rgba(10,10,10,0.06);
  width:100%;max-width:360px;
}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
.login-logo-text{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--navy);letter-spacing:0.15em;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--navy);margin-bottom:24px;}
.login-box input{
  width:100%;padding:13px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;
  color:var(--ink);outline:none;margin-bottom:14px;
  transition:border-color 0.2s;
}
.login-box input:focus{border-color:var(--navy);background:#fff;}
.login-btn{
  width:100%;padding:13px;background:var(--navy);color:#F4F3EF;
  border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.2s;
}
.login-btn:hover{opacity:0.88;}
.login-error{font-size:13px;color:#E85D4A;margin-top:10px;display:none;}

/* ── LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden;}
.layout{display:flex;height:100%;}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;flex-shrink:0;background:var(--navy);
  display:flex;flex-direction:column;height:100%;
  overflow-y:auto;
}
.sb-logo{
  display:flex;align-items:center;gap:10px;
  padding:28px 20px 24px;border-bottom:1px solid rgba(255,255,255,0.08);
}
.sb-logo-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#F4F3EF;letter-spacing:0.15em;}
.sb-nav{flex:1;padding:16px 0;}
.sb-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 20px;font-size:14px;font-weight:400;
  color:rgba(244,243,239,0.6);cursor:pointer;
  transition:background 0.2s,color 0.2s;
  border-left:3px solid transparent;
}
.sb-nav-item:hover{background:rgba(255,255,255,0.06);color:#F4F3EF;}
.sb-nav-item.active{background:rgba(255,255,255,0.08);color:#F4F3EF;border-left-color:#F4F3EF;}
.sb-nav-icon{width:16px;height:16px;opacity:0.7;}
.sb-footer{padding:20px;border-top:1px solid rgba(255,255,255,0.08);}
.sb-footer-label{font-size:11px;color:rgba(244,243,239,0.4);letter-spacing:0.1em;text-transform:uppercase;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.main-header{
  padding:24px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);position:sticky;top:0;z-index:10;
}
.main-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--navy);}
.main-body{padding:32px;flex:1;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:20px 20px 18px;
}
.stat-label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;color:var(--navy);line-height:1;}

/* ── TABLE ── */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{
  padding:12px 16px;font-size:11px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);
  background:var(--surface);text-align:left;
  border-bottom:1px solid var(--border);
}
td{
  padding:14px 16px;font-size:13px;color:var(--ink);
  border-bottom:1px solid var(--border);vertical-align:middle;
}
tr:last-child td{border-bottom:none;}
tr.row-new td:first-child{border-left:3px solid var(--success);}
tr:hover td{background:var(--surface);}

.badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:0.06em;
}
.badge-new{background:#DCFCE7;color:#15803D;}
.badge-reviewed{background:var(--surface2);color:var(--faint);}

.btn-view{
  padding:6px 14px;background:var(--navy);color:#F4F3EF;
  border:none;border-radius:6px;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;cursor:pointer;transition:opacity 0.2s;
  white-space:nowrap;
}
.btn-view:hover{opacity:0.82;}

.services-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}

/* ── DETAIL PANEL ── */
.panel-overlay{
  position:fixed;inset:0;background:rgba(10,10,10,0.3);
  z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.panel-overlay.open{opacity:1;pointer-events:all;}
.panel{
  position:fixed;right:0;top:0;bottom:0;width:480px;max-width:95vw;
  background:#fff;box-shadow:-8px 0 40px rgba(10,10,10,0.1);
  z-index:201;transform:translateX(100%);transition:transform 0.3s ease;
  display:flex;flex-direction:column;overflow:hidden;
}
.panel.open{transform:translateX(0);}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--navy);}
.panel-close{
  width:32px;height:32px;background:var(--surface);border:none;
  border-radius:50%;cursor:pointer;font-size:18px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;transition:background 0.2s;
}
.panel-close:hover{background:var(--surface2);}
.panel-body{flex:1;overflow-y:auto;padding:24px;}
.panel-section{margin-bottom:28px;}
.panel-section-title{
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--faint);margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.panel-field{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start;}
.panel-field-label{font-size:12px;color:var(--faint);min-width:120px;padding-top:1px;}
.panel-field-value{font-size:13px;color:var(--ink);line-height:1.5;flex:1;word-break:break-word;}
.panel-field-value a{color:var(--navy);}

.sig-box{
  border:1px solid var(--border);border-radius:8px;padding:16px;
  background:var(--surface);margin-top:8px;
}
.sig-box img{max-width:100%;height:auto;}
.sig-box-label{font-size:11px;color:var(--faint);margin-bottom:10px;letter-spacing:0.08em;text-transform:uppercase;}

.panel-actions{
  display:flex;gap:10px;padding:16px 24px;
  border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;
  flex-wrap:wrap;
}
.btn-mark{
  padding:10px 18px;background:var(--navy);color:#F4F3EF;
  border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:opacity 0.2s;
}
.btn-mark:hover{opacity:0.85;}
.btn-ghost-sm{
  padding:10px 18px;background:transparent;color:var(--muted);
  border:1px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;
  cursor:pointer;transition:border-color 0.2s,color 0.2s;
}
.btn-ghost-sm:hover{border-color:var(--navy);color:var(--navy);}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--faint);font-size:14px;
}

@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none;}
}
@media(max-width:640px){
  .sidebar{display:none;}
  .main-body{padding:20px 16px;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="24" height="24" viewBox="0 0 100 100" fill="#0A1628">
        <polygon points="50.00,4.00 57.52,29.33 79.57,14.76 69.05,39.00 95.30,42.01 71.67,53.82 89.84,73.00 64.14,66.85 65.73,93.23 50.00,72.00 34.27,93.23 35.86,66.85 10.16,73.00 28.33,53.82 4.70,42.01 30.95,39.00 20.43,14.76 42.48,29.33"/>
      </svg>
      <span class="login-logo-text">LNVX</span>
    </div>
    <p class="login-title">Admin Portal</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sb-logo">
        <svg width="22" height="22" viewBox="0 0 100 100" fill="#F4F3EF">
          <polygon points="50.00,4.00 57.52,29.33 79.57,14.76 69.05,39.00 95.30,42.01 71.67,53.82 89.84,73.00 64.14,66.85 65.73,93.23 50.00,72.00 34.27,93.23 35.86,66.85 10.16,73.00 28.33,53.82 4.70,42.01 30.95,39.00 20.43,14.76 42.48,29.33"/>
        </svg>
        <span class="sb-logo-text">LNVX</span>
      </div>
      <nav class="sb-nav">
        <div class="sb-nav-item active" onclick="filterSubmissions('all',this)">
          <svg class="sb-nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          All Submissions
        </div>
        <div class="sb-nav-item" onclick="filterSubmissions('new',this)">
          <svg class="sb-nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
          New
        </div>
        <div class="sb-nav-item" onclick="filterSubmissions('reviewed',this)">
          <svg class="sb-nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l3 3 7-7"/></svg>
          Reviewed
        </div>
      </nav>
      <div class="sb-footer">
        <div class="sb-footer-label">Lanevox Admin</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="main-header">
        <h1 class="main-title" id="main-title">All Submissions</h1>
        <button class="btn-ghost-sm" onclick="loadData()">↻ Refresh</button>
      </div>
      <div class="main-body">
        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="stat-total">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">New</div>
            <div class="stat-value" id="stat-new">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">This Week</div>
            <div class="stat-value" id="stat-week">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">This Month</div>
            <div class="stat-value" id="stat-month">—</div>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
          <table id="submissions-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Business</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Services</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="7"><div class="empty-state">Loading...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="detail-panel">
  <div class="panel-header">
    <span class="panel-title" id="panel-title">Submission</span>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-actions" id="panel-actions"></div>
</div>

<script>
const API_KEY = 'LanevoxAdmin2026';
let allSubmissions = [];
let currentFilter = 'all';
let currentId = null;

// ── Login ──────────────────────────────────────────────────────────────────
function login() {
  const pw = document.getElementById('pw-input').value;
  if (pw === API_KEY) {
    sessionStorage.setItem('lnvx_admin', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

// Check session on load
if (sessionStorage.getItem('lnvx_admin') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
}

// ── Load Data ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`/api/submissions?key=${API_KEY}`);
    allSubmissions = await res.json();
    updateStats();
    renderTable(currentFilter);
  } catch (e) {
    console.error(e);
  }
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  const now = new Date();
  const weekAgo = new Date(now - 7 * 864e5);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  document.getElementById('stat-total').textContent = allSubmissions.length;
  document.getElementById('stat-new').textContent = allSubmissions.filter(s => s.status === 'new').length;
  document.getElementById('stat-week').textContent = allSubmissions.filter(s => new Date(s.created_at) >= weekAgo).length;
  document.getElementById('stat-month').textContent = allSubmissions.filter(s => new Date(s.created_at) >= monthStart).length;
}

// ── Filter ──────────────────────────────────────────────────────────────────
function filterSubmissions(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.sb-nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const titles = { all: 'All Submissions', new: 'New Submissions', reviewed: 'Reviewed' };
  document.getElementById('main-title').textContent = titles[filter];
  renderTable(filter);
}

// ── Render Table ───────────────────────────────────────────────────────────
function renderTable(filter) {
  const rows = filter === 'all' ? allSubmissions : allSubmissions.filter(s => s.status === filter);
  const tbody = document.getElementById('table-body');

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">No submissions yet.</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(s => {
    const date = new Date(s.created_at).toLocaleDateString('en-AU', {day:'2-digit',month:'short',year:'numeric'});
    const services = (s.services || '').split(',').map(x => x.trim()).filter(Boolean).join(', ');
    const badge = s.status === 'new'
      ? `<span class="badge badge-new">New</span>`
      : `<span class="badge badge-reviewed">Reviewed</span>`;
    return `<tr class="${s.status === 'new' ? 'row-new' : ''}">
      <td>${date}</td>
      <td><strong>${esc(s.business_name)}</strong></td>
      <td>${esc(s.contact_name)}</td>
      <td><a href="mailto:${esc(s.email)}" style="color:var(--navy)">${esc(s.email)}</a></td>
      <td class="services-cell">${esc(services)}</td>
      <td>${badge}</td>
      <td><button class="btn-view" onclick="openPanel(${s.id})">View</button></td>
    </tr>`;
  }).join('');
}

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel(id) {
  currentId = id;
  const s = allSubmissions.find(x => x.id === id);
  if (!s) return;

  document.getElementById('panel-title').textContent = s.business_name;

  const services = (s.services || '').split(',').map(x => x.trim()).filter(Boolean);
  const servicePills = services.map(sv =>
    `<span style="display:inline-block;background:var(--navy);color:#F4F3EF;border-radius:20px;padding:4px 12px;font-size:11px;margin:3px 3px 3px 0;">${esc(sv)}</span>`
  ).join('') || '<span style="color:var(--faint);font-size:13px;">None</span>';

  const f = (label, value, isLink) => {
    if (!value) return '';
    const v = isLink === 'email' ? `<a href="mailto:${esc(value)}">${esc(value)}</a>`
            : isLink === 'tel'   ? `<a href="tel:${esc(value)}">${esc(value)}</a>`
            : isLink === 'url'   ? `<a href="${esc(value)}" target="_blank">${esc(value)}</a>`
            : esc(value);
    return `<div class="panel-field"><span class="panel-field-label">${label}</span><span class="panel-field-value">${v}</span></div>`;
  };

  const date = new Date(s.created_at).toLocaleDateString('en-AU', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});

  document.getElementById('panel-body').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Contact</div>
      ${f('Date', date)}
      ${f('Business', s.business_name)}
      ${f('Industry', s.industry)}
      ${f('Contact', s.contact_name)}
      ${f('Phone', s.phone, 'tel')}
      ${f('Email', s.email, 'email')}
      ${f('Area', s.address)}
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Services</div>
      <div style="margin-bottom:8px;">${servicePills}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Business Details</div>
      ${f('Description', s.description)}
      ${f('Target Customer', s.target_customer)}
      ${f('Goals', s.goals)}
      ${f('Competitors', s.competitors)}
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Brand & Design</div>
      ${f('Brand Colours', s.brand_colours)}
      ${f('Brand Tone', s.brand_tone)}
      ${f('Has Logo', s.has_logo)}
      ${f('Admired Brands', s.admired_brands)}
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Online Presence</div>
      ${f('Current Website', s.current_website, 'url')}
      ${f('Domain Preference', s.domain_preference)}
      ${f('Facebook', s.facebook, 'url')}
      ${f('Instagram', s.instagram)}
    </div>
    ${s.anything_else ? `<div class="panel-section"><div class="panel-section-title">Additional Notes</div>${f('Notes', s.anything_else)}</div>` : ''}
    <div class="panel-section">
      <div class="panel-section-title">Agreement</div>
      <div class="panel-field"><span class="panel-field-label">Agreed to Terms</span><span class="panel-field-value">${s.agreed_to_terms ? '✓ Yes' : '✗ No'}</span></div>
      ${s.signature_image ? `
      <div style="margin-top:12px;">
        <div class="sig-box">
          <div class="sig-box-label">Client Signature</div>
          <img src="${s.signature_image}" alt="Signature">
        </div>
      </div>` : ''}
    </div>
  `;

  const isNew = s.status === 'new';
  document.getElementById('panel-actions').innerHTML = `
    ${isNew ? `<button class="btn-mark" onclick="markReviewed(${s.id})">✓ Mark as Reviewed</button>` : '<span style="font-size:13px;color:var(--faint);">Reviewed</span>'}
    <button class="btn-ghost-sm" onclick="sendPortalInvite(${s.id})">Send Portal Invite</button>
    <button class="btn-ghost-sm" onclick="copyEmail('${esc(s.email)}')">Copy Email</button>
  `;

  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

async function markReviewed(id) {
  await fetch(`/api/submissions/${id}/review?key=${API_KEY}`, { method: 'PUT' });
  const sub = allSubmissions.find(s => s.id === id);
  if (sub) sub.status = 'reviewed';
  updateStats();
  renderTable(currentFilter);
  openPanel(id);
}

function sendPortalInvite(id) {
  const s = allSubmissions.find(x => x.id === id);
  if (!s) return;
  const subject = encodeURIComponent('Your Lanevox Portal Invite');
  const body = encodeURIComponent(`Hi ${s.contact_name.split(' ')[0]},\n\nYour Lanevox client portal is ready. Click here to set up your account:\nhttps://portal.lanevox.com.au\n\n— The Lanevox Team`);
  window.open(`mailto:${s.email}?subject=${subject}&body=${body}`);
}

function copyEmail(email) {
  navigator.clipboard.writeText(email).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy Email'; }, 2000);
  });
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
